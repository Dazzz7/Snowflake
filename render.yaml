services:
  - type: web
    name: us-census-data-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/streamlit_app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true
    envVars:
      - key: USE_LLM
        value: "true"
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: openai/gpt-oss-120b
      - key: LLM_API_KEY
        sync: false
      - key: QUERY_TIMEOUT_SECONDS
        value: "30"
      - key: SNOWFLAKE_ACCOUNT
        sync: false
      - key: SNOWFLAKE_USER
        sync: false
      - key: SNOWFLAKE_PASSWORD
        sync: false
      - key: SNOWFLAKE_ROLE
        sync: false
      - key: SNOWFLAKE_WAREHOUSE
        sync: false
      - key: SNOWFLAKE_DATABASE
        value: US_OPEN_CENSUS_DATA__NEIGHBORHOOD_INSIGHTS__FREE_DATASET
      - key: SNOWFLAKE_SCHEMA
        value: PUBLIC
